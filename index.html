<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Builderment Tree Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Builderment Tree Calculator</h1>

    <label>Item</label>
    <select id="itemSelect"></select>

    <label>Amount</label>
    <input type="number" id="amountInput" value="1" step="0.1" />

    <h2>ALT Recipe Ratios</h2>
    <div id="altInputs"></div>

    <div class="buttons">
      <button onclick="runTree()">Print Tree</button>
      <button onclick="runTopoTree()">Print Topological Tree</button>
    </div>

    <pre id="output"></pre>
  </div>

  <script src="script.js"></script>
</body>
</html>
